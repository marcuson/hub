media: media

components:
  standard_page:
    type: object
    label: Standard page data
    fields:
      - name: title
        label: Page Title
        type: string
      - name: body
        label: Main Content
        type: rich-text
        
content:
  - name: config
    label: Config
    type: group
    items:
      - name: config
        label: Jekyll config
        path: _config.yml
        type: file
        format: yaml
      - name: redirects
        label: Redirects
        path: _redirects
        type: file
    
  - name: index
    label: Home Page
    type: file
    path: index.md
    fields:
      - name: standard_page
        component: standard_page
        type: standard_page
        
  - name: pages
    label: Pages
    type: collection
    path: pages
    filename: "{primary}.md"
    fields:
      - name: standard_page
        component: standard_page
    